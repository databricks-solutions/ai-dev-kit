name: Sync upstream

on:
  schedule:
    - cron: "0 9 * * 1" # every Monday 9am UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # Step 1: fast-forward main to match upstream
      - name: Fast-forward main
        run: |
          git remote add upstream https://github.com/databricks-solutions/ai-dev-kit.git
          git fetch upstream main
          git merge upstream/main --ff-only
          git push origin main

      # Step 2: open a PR to merge main into tilt/main
      - name: Create PR to tilt/main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if tilt/main is already up-to-date with main
          git fetch origin tilt/main
          if git merge-base --is-ancestor main origin/tilt/main; then
            echo "tilt/main is already up-to-date with main. Nothing to do."
            exit 0
          fi

          # Check if there's already an open PR for this
          EXISTING_PR=$(gh pr list --base tilt/main --head main --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists. Skipping."
            exit 0
          fi

          gh pr create \
            --base tilt/main \
            --head main \
            --title "Sync upstream changes from databricks-solutions/ai-dev-kit" \
            --body "$(cat <<'EOF'
          Automated PR to merge upstream changes into \`tilt/main\`.

          Review the changes and resolve any merge conflicts before merging.
          EOF
          )"
