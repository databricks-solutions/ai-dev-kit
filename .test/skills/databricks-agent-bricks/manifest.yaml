---
skill_name: databricks-agent-bricks
tool_modules: []   # No MCP tooling — agent uses Bash + native databricks CLI groups.
description: |
  Create and manage Databricks Agent Bricks via native CLI: Knowledge Assistants
  (`databricks knowledge-assistants ...`) for document Q&A and Supervisor Agents
  (`databricks supervisor-agents ...`) for multi-agent orchestration. For Genie
  Spaces themselves, see databricks-genie.

triggers:
  - knowledge assistant
  - supervisor agent
  - MAS
  - agent bricks
  - document Q&A with RAG

scorers:
  enabled:
    - python_syntax
    - no_hallucinated_apis
    - expected_facts_present

  llm_scorers:
    - Safety
    - guidelines_from_expectations

  default_guidelines:
    - "Must use the native `databricks knowledge-assistants` and `databricks supervisor-agents` CLI command groups — never the deprecated `manage_ka` / `manage_mas` / `tile_id`-era APIs."
    - "Must resolve resources by name when the user gives a name (list + jq filter), not ask the user for IDs already present in the workspace."
    - "Resource paths follow `knowledge-assistants/{uuid}` and `supervisor-agents/{uuid}` — must be used consistently in follow-up commands."
    - "For supervisor `create-tool` with --json: `tool_type` lives INSIDE the JSON body (NOT positional), and each tool_type has its own type-specific block (`genie_space.id`, `knowledge_assistant.knowledge_assistant_id`, `uc_function.name`, `uc_connection.name`, etc.)."
    - "Volume paths must follow `/Volumes/catalog/schema/volume/...` format."
    - "After create, endpoint warmup takes ~2-5 min (KA) or ~10 min (supervisor) — must communicate this when reporting status, not assume immediate readiness."
    - "Must complete the end-to-end flow the user asked for and verify the result (list/get after create) — don't assume success silently."

  trace_expectations:
    tool_limits:
      Bash: 40
      Read: 20
    token_budget:
      max_total: 120000
    required_tools:
      - Read     # Must consult the skill
      - Bash     # CLI is the primary surface
    banned_tools: []

quality_gates:
  syntax_valid: 1.0
  no_hallucinated_apis: 1.0
  expected_facts_present: 0.85
  execution_success: 1.0
