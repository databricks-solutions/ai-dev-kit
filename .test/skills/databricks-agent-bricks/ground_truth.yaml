metadata:
  skill_name: databricks-agent-bricks
  version: 1.0.0
  created_at: '2026-05-21T00:00:00.000000'
  description: |
    Outcome-oriented tests for Agent Bricks (Knowledge Assistants + Supervisor
    Agents). Each prompt asks the agent to deliver an end-to-end flow using
    the native `databricks knowledge-assistants` and `databricks supervisor-agents`
    CLI. Scoring focuses on the workspace state that should exist afterward,
    not on which specific tool calls were used along the way.

test_cases:
  # ============================================================================
  # 1. Knowledge Assistant — create + add source + sync
  # ============================================================================
  - id: ab_ka_create_001
    inputs:
      prompt: |
        Create a Knowledge Assistant called `HR_Policy_Assistant` that indexes
        the PDFs in `/Volumes/ai_dev_kit_test/agents/raw_data/hr_docs/`.
        Description: "Answers HR policy questions with document citations."

        Wire it up so the documents are actually ingested — add the volume as
        a knowledge source and trigger a sync. Tell me the resource ID and
        the final status (`ONLINE` if ready, or otherwise what it's currently
        progressing through).
    outputs:
      execution_success: true
    expectations:
      expected_facts:
        - "databricks knowledge-assistants create-knowledge-assistant with the display name and description"
        - "databricks knowledge-assistants create-knowledge-source with source_type 'files' and files.path pointing to the HR volume"
        - "Knowledge source body lives inside --json; the PARENT is the only positional arg when --json is used"
        - "databricks knowledge-assistants sync-knowledge-sources to start indexing"
        - "databricks knowledge-assistants get-knowledge-assistant to report status; CREATING progresses to ONLINE (~2-5 min)"
        - "Resource path is `knowledge-assistants/{ka_id}` (returned from create), used consistently in every follow-up command"
      databricks_outcomes:
        - kind: knowledge_assistant_exists
          display_name: "HR_Policy_Assistant"
        - kind: knowledge_assistant_has_source
          display_name: "HR_Policy_Assistant"
          source_type: "files"
          path: "/Volumes/ai_dev_kit_test/agents/raw_data/hr_docs/"
        - kind: knowledge_assistant_status_in
          display_name: "HR_Policy_Assistant"
          allowed: ["CREATING", "ONLINE"]
    metadata:
      category: happy_path
      difficulty: easy
      tags: [ka, create, knowledge-assistant, sync]

  # ============================================================================
  # 2. Supervisor Agent — create + attach Genie + KA + example
  # ============================================================================
  - id: ab_mas_create_001
    inputs:
      prompt: |
        Build a Supervisor Agent named `Enterprise_Support_Supervisor` that
        routes between two existing resources I already have in this workspace:
          • A Genie space (find it by listing Genie spaces — look for one whose
            title contains "sales"). Wire it in as a tool called `sales_analyst`.
          • A Knowledge Assistant named `HR_Policy_Assistant`. Wire it in as
            a tool called `hr_docs`.

        Then add one example showing the supervisor that revenue questions
        should go to `sales_analyst` and HR questions should go to `hr_docs`.

        After everything's wired, tell me the supervisor's resource name, its
        serving-endpoint name, and confirm both tools are listed.
    outputs:
      execution_success: true
    expectations:
      expected_facts:
        - "databricks supervisor-agents create-supervisor-agent with display_name positional + --description / --instructions flags"
        - "databricks genie list-spaces (or equivalent) to resolve the sales Genie space_id"
        - "databricks knowledge-assistants list-knowledge-assistants to resolve the HR KA id"
        - "databricks supervisor-agents create-tool ... analyst --json '{tool_type: genie_space, genie_space: {id: <id>}, description: ...}'"
        - "databricks supervisor-agents create-tool ... hr_docs --json '{tool_type: knowledge_assistant, knowledge_assistant: {knowledge_assistant_id: <id>}, description: ...}'"
        - "tool_type lives INSIDE --json (CLI rejects it as positional when --json is used)"
        - "knowledge_assistant block uses `knowledge_assistant_id` (NOT `id`); genie_space block uses `id`"
        - "databricks supervisor-agents create-example with question + guidelines via --json (guidelines is repeated string, positional broken)"
        - "Reports the resource path supervisor-agents/<uuid>, the endpoint_name (mas-<short>-endpoint), and notes endpoint warmup ~10 min before queries succeed"
      databricks_outcomes:
        - kind: supervisor_agent_exists
          display_name: "Enterprise_Support_Supervisor"
        - kind: supervisor_agent_has_tool
          display_name: "Enterprise_Support_Supervisor"
          tool_id: "sales_analyst"
          tool_type: "genie_space"
        - kind: supervisor_agent_has_tool
          display_name: "Enterprise_Support_Supervisor"
          tool_id: "hr_docs"
          tool_type: "knowledge_assistant"
        - kind: supervisor_agent_example_count_gte
          display_name: "Enterprise_Support_Supervisor"
          min: 1
    metadata:
      category: happy_path
      difficulty: medium
      tags: [mas, supervisor-agent, multi-tool, genie, ka, examples]

  # ============================================================================
  # 3. Lifecycle — find existing supervisor and add a new tool
  # ============================================================================
  - id: ab_mas_update_001
    inputs:
      prompt: |
        I have an existing Supervisor Agent called `Customer_Support`. Find it
        by name (don't ask me for the ID), then add a new UC Function tool
        named `lookup_order` that calls
        `ai_dev_kit_test.agents.lookup_customer_order`. Description: "Look up
        order status and shipment history by order ID."

        Confirm the new tool is listed afterward and tell me the supervisor's
        endpoint name.
    outputs:
      execution_success: true
    expectations:
      expected_facts:
        - "databricks supervisor-agents list-supervisor-agents | jq '.[] | select(.display_name == \"Customer_Support\")' to resolve the resource path by name (list returns bare JSON array)"
        - "databricks supervisor-agents create-tool supervisor-agents/<id> lookup_order --json '{tool_type: uc_function, uc_function: {name: \"ai_dev_kit_test.agents.lookup_customer_order\"}, description: ...}'"
        - "databricks supervisor-agents list-tools supervisor-agents/<id> to verify the new tool is attached"
        - "Reports endpoint_name from the existing supervisor (no recreate)"
      databricks_outcomes:
        - kind: supervisor_agent_has_tool
          display_name: "Customer_Support"
          tool_id: "lookup_order"
          tool_type: "uc_function"
          uc_function_name: "ai_dev_kit_test.agents.lookup_customer_order"
    metadata:
      category: happy_path
      difficulty: medium
      tags: [mas, lifecycle, find-by-name, uc-function, update]
