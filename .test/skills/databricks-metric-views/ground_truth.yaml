metadata:
  skill_name: databricks-metric-views
  version: 1.0.0
  created_at: '2026-05-21T00:00:00.000000'
  description: |
    Outcome-oriented tests for Unity Catalog metric views — define in YAML,
    create via SQL `CREATE OR REPLACE VIEW ... WITH METRICS LANGUAGE YAML`,
    query with MEASURE() / dimensions, alter to add measures, and govern access.

test_cases:
  # ============================================================================
  # 1. Define + create a metric view from a star schema
  # ============================================================================
  - id: mv_create_star_schema_001
    inputs:
      prompt: |
        I have these tables in Unity Catalog:
          • `ai_dev_kit_test.metrics.fact_orders` (order_id, customer_id, order_ts, amount_cents)
          • `ai_dev_kit_test.metrics.dim_customers` (customer_id, region, segment)

        Create a governed metric view `ai_dev_kit_test.metrics.orders_metrics` that:
          • Joins fact_orders to dim_customers on customer_id.
          • Exposes dimensions: order date (truncated to month), region, segment.
          • Exposes measures: total revenue (amount_cents/100 summed, as DECIMAL),
            order count (distinct orders), average order value.

        Then run a query against the view that returns total revenue and order
        count by month + region for the last 90 days, and confirm the result
        shape (column names + row count > 0).
    outputs:
      execution_success: true
    expectations:
      expected_facts:
        - "Uses CREATE OR REPLACE VIEW ... WITH METRICS LANGUAGE YAML (not CREATE TABLE)"
        - "YAML defines `source`, `joins` (with join key), `dimensions`, and `measures` sections"
        - "Measures use SQL aggregations (SUM, COUNT(DISTINCT), AVG) with explicit types — `amount_cents/100` cast to DECIMAL for money"
        - "Query uses MEASURE(measure_name) and GROUP BY dimensions — never SELECT * (metric views don't support it)"
        - "Backticks around dimension names that contain spaces or non-alphanumeric chars"
        - "Confirms via a SELECT count(*) or by inspecting the returned rows that the view returned data"
      databricks_outcomes:
        - kind: uc_view_exists
          name: "ai_dev_kit_test.metrics.orders_metrics"
        - kind: uc_view_is_metric_view
          name: "ai_dev_kit_test.metrics.orders_metrics"
        - kind: query_returns_rows
          against: "ai_dev_kit_test.metrics.orders_metrics"
    metadata:
      category: happy_path
      difficulty: medium
      tags: [create, star-schema, joins, query]

  # ============================================================================
  # 2. Alter an existing metric view — add a new measure
  # ============================================================================
  - id: mv_alter_add_measure_002
    inputs:
      prompt: |
        I already have `ai_dev_kit_test.metrics.orders_metrics`. Add a new
        measure called `avg_order_value` (mean of order amount in dollars),
        then verify it's visible by querying just that measure grouped by region.
    outputs:
      execution_success: true
    expectations:
      expected_facts:
        - "Either ALTER VIEW ... SET METRICS LANGUAGE YAML with the full updated YAML, or CREATE OR REPLACE VIEW — depending on what the docs/skill currently recommend"
        - "Inspects the existing view first (`DESCRIBE EXTENDED ai_dev_kit_test.metrics.orders_metrics` or equivalent) so the new measure is merged with existing ones, not overwriting them"
        - "Query verifies the new measure: `SELECT region, MEASURE(avg_order_value) FROM ai_dev_kit_test.metrics.orders_metrics GROUP BY region`"
      databricks_outcomes:
        - kind: uc_view_metric_has_measure
          name: "ai_dev_kit_test.metrics.orders_metrics"
          measure: "avg_order_value"
        - kind: query_returns_rows
          against: "ai_dev_kit_test.metrics.orders_metrics"
    metadata:
      category: happy_path
      difficulty: medium
      tags: [alter, add-measure, query]

  # ============================================================================
  # 3. Govern access — grant SELECT to a group
  # ============================================================================
  - id: mv_grant_access_003
    inputs:
      prompt: |
        Grant SELECT on `ai_dev_kit_test.metrics.orders_metrics` to the
        `data-consumers` group. Confirm afterward by showing the privileges
        currently held by that group on the view.
    outputs:
      execution_success: true
    expectations:
      expected_facts:
        - "GRANT SELECT ON [TABLE|VIEW] `ai_dev_kit_test.metrics.orders_metrics` TO `data-consumers`"
        - "Verifies with SHOW GRANTS `data-consumers` ON `ai_dev_kit_test.metrics.orders_metrics` (or SHOW GRANTS ON ... and filter)"
        - "Returns the SELECT privilege in the verification output"
      databricks_outcomes:
        - kind: uc_privilege_granted
          principal: "data-consumers"
          privilege: "SELECT"
          on_object: "ai_dev_kit_test.metrics.orders_metrics"
    metadata:
      category: happy_path
      difficulty: easy
      tags: [grant, governance, access]
