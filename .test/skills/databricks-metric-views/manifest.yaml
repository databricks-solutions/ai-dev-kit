---
skill_name: databricks-metric-views
tool_modules: []
description: |
  Unity Catalog metric views — define, create, query, alter, and govern reusable
  business metrics in YAML. Tests verify the actual workspace state (view
  created with metric semantics, measures added, grants applied) after the
  agent executes the prompt end-to-end via SQL + the databricks CLI.

scorers:
  enabled:
    - sql_syntax
    - no_hallucinated_apis
    - expected_facts_present

  llm_scorers:
    - Safety
    - guidelines_from_expectations

  default_guidelines:
    - "Must define metric views with `CREATE OR REPLACE VIEW ... WITH METRICS LANGUAGE YAML` — not CREATE TABLE, not a regular VIEW."
    - "Querying a metric view must use MEASURE(measure_name) and explicit GROUP BY dimensions. SELECT * doesn't work on metric views — must not suggest it."
    - "Dimensions with spaces / non-alphanumeric characters must be backtick-quoted in queries."
    - "Must verify the result of every action (post-create: SELECT to confirm rows; post-alter: query the new measure; post-grant: SHOW GRANTS) — don't assume success."
    - "Money columns must be cast to DECIMAL (not stored as cents-as-INT silently passed through)."

  trace_expectations:
    tool_limits:
      Bash: 25
      Read: 15
    token_budget:
      max_total: 100000
    required_tools:
      - Read
      - Bash
    banned_tools: []

quality_gates:
  sql_syntax: 1.0
  no_hallucinated_apis: 1.0
  expected_facts_present: 0.85
  execution_success: 1.0
