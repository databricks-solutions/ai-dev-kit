metadata:
  skill_name: databricks-unity-catalog
  version: 1.0.0
  created_at: '2026-05-21T00:00:00.000000'
  description: |
    Outcome-oriented tests for Unity Catalog: volume file operations and
    system-table queries (lineage, audit, billing). Tests verify the actual
    workspace state (files in volume, query rows returned) after the agent
    runs the prompt end-to-end via `databricks fs` and
    `databricks experimental aitools tools query`.

test_cases:
  # ============================================================================
  # 1. Volume file operations — create directory + upload + list + download
  # ============================================================================
  - id: uc_volume_ops_001
    inputs:
      prompt: |
        I need to stage some data files for a downstream pipeline. In the
        Unity Catalog volume `ai_dev_kit_test.ops.landing`:
        1. Create a subdirectory called `inbox/2026-05-21/`.
        2. Upload my local file `./sample_orders.csv` into that subdirectory.
        3. List the contents to confirm the file is there.
        4. Then download the same file back to `/tmp/sample_orders_roundtrip.csv`
           so I can verify the upload worked.
    outputs:
      execution_success: true
    expectations:
      expected_facts:
        - "Uses `databricks fs mkdirs dbfs:/Volumes/ai_dev_kit_test/ops/landing/inbox/2026-05-21/` (the `dbfs:` prefix is REQUIRED for UC Volume paths via the fs CLI)"
        - "Uploads with `databricks fs cp ./sample_orders.csv dbfs:/Volumes/ai_dev_kit_test/ops/landing/inbox/2026-05-21/`"
        - "Verifies with `databricks fs ls dbfs:/Volumes/ai_dev_kit_test/ops/landing/inbox/2026-05-21/`"
        - "Downloads roundtrip with `databricks fs cp dbfs:/Volumes/.../sample_orders.csv /tmp/sample_orders_roundtrip.csv`"
        - "Does NOT use hallucinated `list_volume_files` / `upload_to_volume` / `download_from_volume` tools (no such tools)"
      databricks_outcomes:
        - kind: uc_volume_path_exists
          path: "/Volumes/ai_dev_kit_test/ops/landing/inbox/2026-05-21/"
        - kind: uc_volume_contains_file
          path: "/Volumes/ai_dev_kit_test/ops/landing/inbox/2026-05-21/sample_orders.csv"
        - kind: local_file_exists
          path: "/tmp/sample_orders_roundtrip.csv"
    metadata:
      category: happy_path
      difficulty: easy
      tags: [volumes, fs-operations, upload, download]

  # ============================================================================
  # 2. Lineage query — find upstream tables feeding a target
  # ============================================================================
  - id: uc_lineage_query_001
    inputs:
      prompt: |
        I need to understand what feeds into `ai_dev_kit_test.analytics.gold_sales_summary`.
        Query the system lineage tables to find every source table that fed
        into it in the last 30 days, and tell me the distinct source table
        names + how many lineage events were recorded for each.
    outputs:
      execution_success: true
    expectations:
      expected_facts:
        - "Queries `system.access.table_lineage` (the canonical lineage system table)"
        - "Filters by `target_table_full_name = 'ai_dev_kit_test.analytics.gold_sales_summary'` AND `event_date >= current_date() - 30`"
        - "Groups by `source_table_full_name` and aggregates a count of events"
        - "Executes via `databricks experimental aitools tools query --warehouse <WH> \"...\"` — NOT via a hallucinated MCP execute_sql tool"
        - "Resolves a SQL warehouse ID at runtime (e.g., `databricks warehouses list`) rather than asking the user"
        - "Returns a list of source tables with event counts"
      databricks_outcomes:
        - kind: warehouse_query_succeeded
          source_table: "system.access.table_lineage"
        - kind: response_includes_source_tables_list
    metadata:
      category: happy_path
      difficulty: medium
      tags: [system-tables, lineage, query, governance]

  # ============================================================================
  # 3. Audit log query — recent permission changes
  # ============================================================================
  - id: uc_audit_recent_grants_001
    inputs:
      prompt: |
        Show me all GRANT / REVOKE operations that happened in this workspace
        in the last 7 days. For each, return: when, who did it (email), the
        action, and the target object. Sort by most recent first, limit 100.

        If `system.access.audit` isn't accessible to my user, tell me what I
        need to grant to be able to query it.
    outputs:
      execution_success: true
    expectations:
      expected_facts:
        - "Queries `system.access.audit` (not workspace audit logs API — the system table is the modern path)"
        - "Filters `action_name LIKE '%GRANT%' OR action_name LIKE '%REVOKE%'` AND `event_time >= current_timestamp() - INTERVAL 7 DAYS`"
        - "Selects `event_time, user_identity.email, action_name, request_params` (or equivalent target field)"
        - "ORDER BY event_time DESC LIMIT 100"
        - "Executes via `databricks experimental aitools tools query --warehouse <WH> \"...\"`"
        - "On permission failure / empty: explains the required GRANTs (`USE CATALOG ON system`, `USE SCHEMA ON system.access`, `SELECT ON SCHEMA system.access`)"
      databricks_outcomes:
        - kind: warehouse_query_attempted
          source_table: "system.access.audit"
        - kind: response_returns_data_or_permission_guidance
    metadata:
      category: happy_path
      difficulty: medium
      tags: [system-tables, audit, governance, permissions]
