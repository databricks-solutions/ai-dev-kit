metadata:
  skill_name: databricks-unstructured-pdf-generation
  version: 1.0.0
  created_at: '2026-05-21T00:00:00.000000'
  description: |
    Outcome-oriented tests for generating synthetic PDFs and uploading them to
    Unity Catalog volumes. Each prompt asks for an end-to-end flow: write HTML,
    convert via the skill's pdf_generator.py, upload to a UC volume, optionally
    produce a doc_questions.json for RAG evaluation.

test_cases:
  # ============================================================================
  # 1. Generate + upload a small PDF set
  # ============================================================================
  - id: pdf_basic_generate_upload_001
    inputs:
      prompt: |
        Generate 3 short synthetic PDFs about cloud-storage best practices
        and upload them to the Unity Catalog volume
        `/Volumes/ai_dev_kit_test/rag/raw_pdfs/cloud_storage/`. Confirm the
        files are present in the volume after upload.
    outputs:
      execution_success: true
    expectations:
      expected_facts:
        - "Writes the HTML source files under `./raw_data/html/...` (one HTML file per intended PDF)"
        - "Runs the bundled `pdf_generator.py convert --input ./raw_data/html --output ./raw_data/pdf` (NOT a hallucinated `generate_pdf_documents` MCP tool)"
        - "Uploads via `databricks fs cp -r --overwrite ./raw_data/pdf dbfs:/Volumes/ai_dev_kit_test/rag/raw_pdfs/cloud_storage/`"
        - "`databricks fs ls dbfs:/Volumes/.../cloud_storage/` to confirm the 3 PDFs landed (requires `dbfs:` scheme prefix)"
      databricks_outcomes:
        - kind: uc_volume_contains_files
          path: "/Volumes/ai_dev_kit_test/rag/raw_pdfs/cloud_storage/"
          extension: ".pdf"
          min_count: 3
    metadata:
      category: happy_path
      difficulty: easy
      tags: [generate, upload, volume]

  # ============================================================================
  # 2. Topic-targeted set for a RAG demo
  # ============================================================================
  - id: pdf_topic_set_002
    inputs:
      prompt: |
        I'm building a RAG demo over HR policies. Generate ~8 PDF documents
        covering: PTO policy, remote-work guidelines, benefits summary,
        expense reimbursement, code of conduct, harassment-reporting
        procedure, IT acceptable-use policy, and onboarding checklist.

        Use subdirectories under html/ to organise them (e.g.
        `policy/`, `benefits/`, `procedures/`). Upload everything to
        `/Volumes/ai_dev_kit_test/rag/raw_pdfs/hr_policies/`, preserving the
        subdirectory structure.
    outputs:
      execution_success: true
    expectations:
      expected_facts:
        - "HTML files organised under subdirectories — `pdf_generator.py convert` preserves the input directory structure in the output"
        - "Each document has substantive content (not stub placeholders) covering the requested topic"
        - "Upload preserves the subdirectory layout in the volume (subdir → subdir mapping)"
        - "Final verification: `databricks fs ls -R` (or recursive walk) shows ~8 PDFs across the subdirectories"
      databricks_outcomes:
        - kind: uc_volume_contains_files
          path: "/Volumes/ai_dev_kit_test/rag/raw_pdfs/hr_policies/"
          extension: ".pdf"
          min_count: 8
        - kind: uc_volume_has_subdirectories
          path: "/Volumes/ai_dev_kit_test/rag/raw_pdfs/hr_policies/"
          min: 2
    metadata:
      category: happy_path
      difficulty: medium
      tags: [generate, multi-doc, subdirectories, hr-policies, rag]

  # ============================================================================
  # 3. RAG evaluation: PDFs + a doc_questions.json with test questions
  # ============================================================================
  - id: pdf_with_eval_questions_003
    inputs:
      prompt: |
        Generate 5 synthetic technical-documentation PDFs (a fake product
        called "Lumera DB"). For each PDF, also produce a `doc_questions.json`
        entry containing 2-3 test questions whose answers are findable in
        the document (for evaluating a retrieval system later).

        Upload PDFs and `doc_questions.json` to
        `/Volumes/ai_dev_kit_test/rag/raw_pdfs/lumera_docs/`. Confirm both
        the PDF count and that the JSON has questions for every document.
    outputs:
      execution_success: true
    expectations:
      expected_facts:
        - "5 HTML files → 5 PDFs via `pdf_generator.py convert`"
        - "`doc_questions.json` produced with one entry per PDF (`doc_name`, `questions: [...]` with 2-3 questions each grounded in the PDF content)"
        - "Both PDFs and `doc_questions.json` uploaded to the same volume path"
        - "Verification: PDF count == 5 AND every PDF filename has a matching entry in doc_questions.json"
      databricks_outcomes:
        - kind: uc_volume_contains_files
          path: "/Volumes/ai_dev_kit_test/rag/raw_pdfs/lumera_docs/"
          extension: ".pdf"
          min_count: 5
        - kind: uc_volume_contains_file
          path: "/Volumes/ai_dev_kit_test/rag/raw_pdfs/lumera_docs/doc_questions.json"
        - kind: doc_questions_json_covers_all_pdfs
          path: "/Volumes/ai_dev_kit_test/rag/raw_pdfs/lumera_docs/"
    metadata:
      category: happy_path
      difficulty: hard
      tags: [generate, rag-eval, doc-questions, json, retrieval]
