metadata:
  skill_name: databricks-spark-declarative-pipelines
  version: 1.0.0
  created_at: '2026-05-21T00:00:00.000000'
  description: |
    Outcome-oriented tests for SDP. Each prompt asks for an end-to-end
    pipeline: write the .sql/.py files, upload to workspace, create the
    pipeline (serverless, continuous:false), start an update, poll the
    specific update_id, and confirm the target UC tables contain data.

test_cases:
  # ============================================================================
  # 1. Bronze — Auto Loader ingestion from a Volume into a streaming table
  # ============================================================================
  - id: sdp_bronze_ingest_e2e_001
    inputs:
      prompt: |
        I have JSON files in `/Volumes/ai_dev_kit_test/sdp/raw/orders/` with
        schema: order_id STRING, customer_id STRING, order_date DATE,
        amount DOUBLE, status STRING.

        Build an SDP pipeline that ingests these into a streaming bronze table
        at `ai_dev_kit_test.sdp.bronze_orders` (add `_ingested_at` + the source
        file path). Use serverless, triggered (not continuous). Upload the
        pipeline file to my workspace, create the pipeline, run it once, wait
        for it to finish, and confirm the table has at least one row.
    outputs:
      execution_success: true
    expectations:
      expected_facts:
        - "Uses `CREATE OR REFRESH STREAMING TABLE` (NOT `CREATE OR REPLACE`)"
        - "Uses `STREAM read_files('/Volumes/.../raw/orders/', format => 'json')` for Auto Loader"
        - "Adds `current_timestamp() AS _ingested_at` and `_metadata.file_path AS _source_file`"
        - "`databricks workspace import` with --format SOURCE --language SQL (or --format RAW for raw files) to upload"
        - "`databricks pipelines create --json` with `serverless: true`, `continuous: false` EXPLICIT, `libraries: [{glob: {include: ...}}]`"
        - "`UPDATE_ID=$(databricks pipelines start-update <id> | jq -r .update_id)` — captures the update_id"
        - "Polls `databricks pipelines get-update <pid> $UPDATE_ID` until COMPLETED|FAILED|CANCELED — NOT `pipelines get` top-level state"
        - "On FAILED: surfaces the error via `pipelines list-pipeline-events` and stops; does not silently retry"
        - "Verifies the table contains data via `databricks experimental aitools tools query` after the update completes"
      databricks_outcomes:
        - kind: sdp_pipeline_exists
          name_contains: "orders"
        - kind: sdp_pipeline_continuous_false
          name_contains: "orders"
        - kind: uc_table_exists
          name: "ai_dev_kit_test.sdp.bronze_orders"
        - kind: uc_table_has_columns
          name: "ai_dev_kit_test.sdp.bronze_orders"
          required: ["order_id", "customer_id", "_ingested_at", "_source_file"]
        - kind: sdp_update_succeeded
          name_contains: "orders"
    metadata:
      category: happy_path
      difficulty: medium
      tags: [bronze, auto-loader, streaming, e2e, serverless]

  # ============================================================================
  # 2. Silver — CDC + SCD Type 2 with AUTO CDC
  # ============================================================================
  - id: sdp_silver_cdc_scd2_e2e_002
    inputs:
      prompt: |
        I have a bronze table `ai_dev_kit_test.sdp.bronze_customers_cdc` with
        columns: customer_id, customer_name, email, phone, address,
        event_timestamp TIMESTAMP, operation STRING (INSERT/UPDATE/DELETE).

        Build an SDP pipeline that produces a silver SCD Type 2 history table
        at `ai_dev_kit_test.sdp.silver_customers_history` keyed by
        customer_id, using event_timestamp as the sequence column.

        Upload, create the pipeline (serverless, triggered, continuous:false),
        run it, and confirm the silver table has the SCD Type 2 metadata
        columns (`__START_AT`, `__END_AT`) populated.
    outputs:
      execution_success: true
    expectations:
      expected_facts:
        - "Uses `AUTO CDC INTO` (or `APPLY CHANGES INTO`) targeting the silver table"
        - "`KEYS (customer_id) SEQUENCE BY event_timestamp` (or equivalent ordering column)"
        - "`STORED AS SCD TYPE 2` to track history"
        - "`APPLY AS DELETE WHEN operation = 'DELETE'` to honour deletes"
        - "Source declared with `STREAM(ai_dev_kit_test.sdp.bronze_customers_cdc)`"
        - "Pipeline created with `serverless: true, continuous: false` explicit"
        - "Polls the specific update_id, not pipeline-level state"
        - "Verifies presence of SCD2 metadata columns (`__START_AT`, `__END_AT`) and that more than 1 row per customer can exist when history was updated"
      databricks_outcomes:
        - kind: uc_table_exists
          name: "ai_dev_kit_test.sdp.silver_customers_history"
        - kind: uc_table_has_columns
          name: "ai_dev_kit_test.sdp.silver_customers_history"
          required: ["customer_id", "__START_AT", "__END_AT"]
        - kind: sdp_update_succeeded
          name_contains: "customers"
    metadata:
      category: happy_path
      difficulty: hard
      tags: [silver, cdc, scd-type-2, auto-cdc, e2e]

  # ============================================================================
  # 3. Gold — materialized view aggregation
  # ============================================================================
  - id: sdp_gold_aggregate_e2e_003
    inputs:
      prompt: |
        From silver table `ai_dev_kit_test.sdp.silver_orders` (columns:
        order_id, customer_id, order_date DATE, amount DECIMAL(10,2),
        status STRING), build a gold materialized view at
        `ai_dev_kit_test.sdp.gold_daily_sales` with one row per
        (order_date, status) containing: total_amount, order_count,
        unique_customers.

        Cluster by order_date for query performance. Upload, create the
        pipeline (serverless, triggered), run it, and verify the gold
        table has rows.
    outputs:
      execution_success: true
    expectations:
      expected_facts:
        - "Uses `CREATE OR REFRESH MATERIALIZED VIEW` (NOT streaming table — aggregations are batch)"
        - "`CLUSTER BY (order_date)` for Liquid Clustering (not PARTITION BY)"
        - "`SUM(amount)`, `COUNT(DISTINCT order_id)`, `COUNT(DISTINCT customer_id)`"
        - "Reads silver as a plain table (no STREAM() wrapper around the source for MV)"
        - "Pipeline: serverless:true, continuous:false"
        - "Polls update_id, surfaces errors, verifies row count > 0 via warehouse query"
      databricks_outcomes:
        - kind: uc_table_exists
          name: "ai_dev_kit_test.sdp.gold_daily_sales"
        - kind: uc_table_is_materialized_view
          name: "ai_dev_kit_test.sdp.gold_daily_sales"
        - kind: query_returns_rows
          against: "ai_dev_kit_test.sdp.gold_daily_sales"
        - kind: sdp_update_succeeded
          name_contains: "daily_sales"
    metadata:
      category: happy_path
      difficulty: medium
      tags: [gold, materialized-view, aggregation, cluster-by, e2e]
