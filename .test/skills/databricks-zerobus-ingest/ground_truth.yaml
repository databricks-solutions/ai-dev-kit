- id: databricks-zerobus-ingest_focus_02
  inputs:
    prompt: I'm getting a protobuf descriptor pool conflict when using Zerobus Ingest
      with grpcio-tools on Databricks Runtime 14.x. How do I fix this?
  outputs:
    response: "This is a known compatibility issue between certain protobuf runtime\
      \ versions (5.26.x and 5.29.x shipped with DBR 14.x/15.x) and newer `grpcio-tools`\
      \ releases. Here is how to diagnose and fix it:\n\n## Diagnosis\n\n```python\n\
      import google.protobuf\nprint(f\"Protobuf runtime version: {google.protobuf.__version__}\"\
      )\n# If this prints 5.26.x or 5.29.x, you need the pinned grpcio-tools\n```\n\
      \n## Fix: Smart grpcio-tools Installation\n\n```python\n# First, ensure you\
      \ have the latest compatible core SDKs\n%pip install databricks-sdk>=0.97.0\
      \ databricks-zerobus-ingest-sdk>=1.1.0\n\n# Then install grpcio-tools based\
      \ on the detected protobuf version\nimport google.protobuf\nruntime_version\
      \ = google.protobuf.__version__\nprint(f\"Runtime protobuf version: {runtime_version}\"\
      )\n\nif runtime_version.startswith(\"5.26\") or runtime_version.startswith(\"\
      5.29\"):\n    # Pin grpcio-tools to avoid descriptor pool conflicts\n    %pip\
      \ install grpcio-tools==1.62.0\n    print(\"Installed grpcio-tools==1.62.0 for\
      \ protobuf compatibility\")\nelse:\n    # Use latest grpcio-tools for other\
      \ protobuf versions\n    %pip install grpcio-tools\n    print(f\"Installed latest\
      \ grpcio-tools for protobuf {runtime_version}\")\n```\n\n## Why This Happens\n\
      \n| DBR Version | Protobuf Version | Compatible grpcio-tools |\n|---|---|---|\n\
      | 14.x | 5.26.x | `==1.62.0` |\n| 15.x | 5.29.x | `==1.62.0` |\n| 13.x and earlier\
      \ | 3.x / 4.x | Latest |\n| 16.x+ | 6.x+ | Latest |\n\nThe conflict occurs because\
      \ `grpcio-tools` bundles its own protobuf descriptor pool, which clashes with\
      \ the runtime version when they are incompatible. Pinning `grpcio-tools==1.62.0`\
      \ uses a bundled protobuf that is compatible with the 5.26.x/5.29.x runtime.\n\
      \n## Verify the Fix\n\n```python\n# After installation and kernel restart, verify\
      \ no import errors\nfrom grpc_tools import protoc\nfrom zerobus.sdk.sync import\
      \ ZerobusSdk, RecordType\nprint(\"All imports successful - no descriptor pool\
      \ conflicts\")\n```\n\n## Additional Tips\n\n- Always restart the Python kernel\
      \ (`dbutils.library.restartPython()`) after `%pip install` in notebooks.\n-\
      \ Pin exact versions in `requirements.txt` for production cluster init scripts\
      \ to ensure reproducibility.\n- If you are using `databricks-zerobus-ingest-sdk>=1.1.0`,\
      \ the SDK itself does not require `grpcio-tools` at runtime — only for compiling\
      \ `.proto` files during development."
    execution_success: true
