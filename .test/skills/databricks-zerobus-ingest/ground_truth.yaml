      \n```python\n# Step 1: Install core SDKs with pinned minimum versions\n%pip\
      \ install databricks-sdk>=0.97.0 databricks-zerobus-ingest-sdk>=1.1.0\n\n# Step\
      \ 2: Smart grpcio-tools installation based on runtime protobuf version\nimport\
      \ google.protobuf\nruntime_version = google.protobuf.__version__\nprint(f\"\
      Runtime protobuf version: {runtime_version}\")\n\nif runtime_version.startswith(\"\
      5.26\") or runtime_version.startswith(\"5.29\"):\n    # These protobuf versions\
      \ require a pinned grpcio-tools to avoid descriptor conflicts\n    %pip install\
      \ grpcio-tools==1.62.0\nelse:\n    # Newer or older protobuf versions can use\
      \ the latest grpcio-tools\n    %pip install grpcio-tools\n\nprint(\"Installation\
      \ complete. Restart the Python kernel if running in a notebook.\")\n```\n\n\
      **Why these versions?**\n\n| Package | Minimum Version | Reason |\n|---|---|---|\n\
      | `databricks-sdk` | `>=0.97.0` | Required for latest Unity Catalog APIs and\
      \ token refresh fixes |\n| `databricks-zerobus-ingest-sdk` | `>=1.1.0` | Includes\
      \ stream stability improvements and ACK reliability fixes |\n| `grpcio-tools`\
      \ | `==1.62.0` (conditional) | Avoids protobuf descriptor pool conflicts on\
      \ DBR 14.x/15.x |\n\n**Verification:**\n```python\nimport databricks.sdk\nimport\
      \ zerobus\nprint(f\"databricks-sdk version: {databricks.sdk.__version__}\")\n\
