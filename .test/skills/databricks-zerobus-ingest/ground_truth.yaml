- id: databricks-zerobus-ingest_focus_01
  inputs:
    prompt: Write a production-ready Python Zerobus Ingest producer using the latest
      SDK versions (databricks-sdk 0.97.0, zerobus-ingest-sdk 1.1.0) with Protobuf
      serialization, proper version checks, and error handling
  outputs:
    response: "Here is a production-ready Zerobus Ingest producer using the latest\
      \ SDK versions with Protobuf serialization:\n\n## Step 1: Install Dependencies\n\
      \n```python\n# Install latest compatible SDK versions\n%pip install databricks-sdk>=0.97.0\
      \ databricks-zerobus-ingest-sdk>=1.1.0\n\n# Smart grpcio-tools installation\n\
      import google.protobuf\nruntime_version = google.protobuf.__version__\nprint(f\"\
      Runtime protobuf version: {runtime_version}\")\n\nif runtime_version.startswith(\"\
      5.26\") or runtime_version.startswith(\"5.29\"):\n    %pip install grpcio-tools==1.62.0\n\
      else:\n    %pip install grpcio-tools\n```\n\n## Step 2: Define Protobuf Schema\
      \ (events.proto)\n\n```protobuf\nsyntax = \"proto3\";\npackage events;\n\nmessage\
      \ SensorEvent {\n  string device_id = 1;\n  double temperature = 2;\n  int64\
      \ event_timestamp = 3;\n  string status = 4;\n}\n```\n\nCompile with:\n```bash\n\
      python -m grpc_tools.protoc -I. --python_out=. --grpc_python_out=. events.proto\n\
      ```\n\n## Step 3: Production Producer\n\n```python\nimport time\nimport logging\n\
      from zerobus.sdk.sync import ZerobusSdk, RecordType\nfrom events_pb2 import\
      \ SensorEvent\n\nlogging.basicConfig(level=logging.INFO)\nlogger = logging.getLogger(__name__)\n\
      \n# Configuration\nSERVER_ENDPOINT = \"<your-workspace-region>.zerobus.databricks.com:443\"\
      \nCLIENT_ID = \"<service-principal-client-id>\"\nCLIENT_SECRET = \"<service-principal-client-secret>\"\
      \nTABLE_FQN = \"catalog.schema.sensor_events\"\n\nMAX_RETRIES = 5\nBASE_BACKOFF_SECONDS\
      \ = 1.0\nMAX_BACKOFF_SECONDS = 60.0\n\ndef create_sdk_client():\n    \"\"\"\
      Initialize the Zerobus SDK with service principal credentials.\"\"\"\n    return\
      \ ZerobusSdk(\n        server_endpoint=SERVER_ENDPOINT,\n        client_id=CLIENT_ID,\n\
      \        client_secret=CLIENT_SECRET,\n    )\n\ndef ingest_with_retry(records:\
      \ list, max_retries: int = MAX_RETRIES):\n    \"\"\"Ingest records with exponential\
      \ backoff retry on failure.\"\"\"\n    attempt = 0\n    backoff = BASE_BACKOFF_SECONDS\n\
      \n    while attempt <= max_retries:\n        sdk = None\n        stream = None\n\
      \        try:\n            sdk = create_sdk_client()\n            stream = sdk.create_stream(\n\
      \                table=TABLE_FQN,\n                record_type=RecordType.PROTOBUF,\n\
      \            )\n            logger.info(f\"Stream created. Ingesting {len(records)}\
      \ records (attempt {attempt + 1}).\")\n\n            acks = []\n           \
      \ for record in records:\n                proto_msg = SensorEvent(\n       \
      \             device_id=record[\"device_id\"],\n                    temperature=record[\"\
      temperature\"],\n                    event_timestamp=record[\"event_timestamp\"\
      ],\n                    status=record[\"status\"],\n                )\n    \
      \            ack = stream.ingest_record(proto_msg.SerializeToString())\n   \
      \             acks.append(ack)\n\n            # Wait for all ACKs to confirm\
      \ durability\n            for ack in acks:\n                ack.wait_for_ack()\n\
      \n            stream.flush()\n            logger.info(f\"Successfully ingested\
      \ {len(records)} records.\")\n            return  # Success\n\n        except\
      \ Exception as e:\n            logger.warning(f\"Ingestion attempt {attempt\
      \ + 1} failed: {e}\")\n            attempt += 1\n            if attempt > max_retries:\n\
      \                logger.error(\"Max retries exceeded. Raising exception.\")\n\
      \                raise\n            sleep_time = min(backoff * (2 ** (attempt\
      \ - 1)), MAX_BACKOFF_SECONDS)\n            logger.info(f\"Retrying in {sleep_time:.1f}s...\"\
      )\n            time.sleep(sleep_time)\n        finally:\n            if stream:\n\
      \                try:\n                    stream.close()\n                except\
      \ Exception:\n                    pass\n            if sdk:\n              \
      \  try:\n                    sdk.close()\n                except Exception:\n\
      \                    pass\n\n# Example usage\nif __name__ == \"__main__\":\n\
      \    sample_records = [\n        {\"device_id\": \"sensor-001\", \"temperature\"\
      : 22.5, \"event_timestamp\": int(time.time()), \"status\": \"ok\"},\n      \
      \  {\"device_id\": \"sensor-002\", \"temperature\": 35.1, \"event_timestamp\"\
      : int(time.time()), \"status\": \"warning\"},\n    ]\n    ingest_with_retry(sample_records)\n\
      ```\n\n**Key production considerations:**\n- **SDK versions**: `databricks-sdk>=0.97.0`\
      \ and `databricks-zerobus-ingest-sdk>=1.1.0` are required for stability.\n-\
      \ **Protobuf compatibility**: Always check `google.protobuf.__version__` before\
      \ installing `grpcio-tools`.\n- **At-least-once delivery**: Zerobus guarantees\
      \ at-least-once semantics; design your target table to handle duplicate records\
      \ (e.g., use a deduplication key).\n- **Stream limits**: Max 100 MB/s and 15,000\
      \ rows/s per stream.\n- **Cleanup**: Always close streams and SDK clients in\
      \ `finally` blocks to avoid resource leaks."
    execution_success: true
