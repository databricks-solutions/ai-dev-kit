metadata:
  skill_name: databricks-vector-search
  version: 1.0.0
  created_at: '2026-05-21T00:00:00.000000'
  description: |
    Outcome-oriented tests for Databricks Vector Search. Each prompt asks for
    an end-to-end flow (endpoint up, index created and synced, query returns
    relevant results) and verifies the actual workspace state.

test_cases:
  # ============================================================================
  # 1. End-to-end RAG index: endpoint + Delta-sync index with managed embeddings
  # ============================================================================
  - id: vs_e2e_managed_embeddings_001
    inputs:
      prompt: |
        Set up a vector search index for a RAG demo over our docs.

        Source: `ai_dev_kit_test.rag.docs_chunks` Delta table with columns
        `chunk_id STRING (primary key), content STRING, doc_uri STRING,
        title STRING, category STRING`. (Assume the table already exists
        with ~1000 rows.)

        I need:
          • A standard vector search endpoint named `rag-vs-endpoint` (create
            it if it doesn't exist).
          • A Delta-sync index named `ai_dev_kit_test.rag.docs_chunks_vs_index`
            built on top of that table, with managed embeddings using the
            Foundation Model API `databricks-gte-large-en`.
          • Wait until the endpoint is ONLINE and the index has finished its
            initial sync.

        Then run a similarity query for "How do I configure SSO?" and return
        the top 3 chunks with their doc_uri and title.
    outputs:
      execution_success: true
    expectations:
      expected_facts:
        - "Source Delta table requires Change Data Feed enabled — must verify or set `TBLPROPERTIES (delta.enableChangeDataFeed = true)` before creating the Delta-sync index"
        - "Creates the endpoint via `databricks vector-search-endpoints create` or the Python SDK `VectorSearchClient().create_endpoint(name='rag-vs-endpoint', endpoint_type='STANDARD')`"
        - "Polls endpoint state until `READY` / `ONLINE` (don't query before it's online)"
        - "Creates a delta-sync index with `pipeline_type='TRIGGERED'` (or CONTINUOUS if the user asked for live sync) and `embedding_source_columns=[{source_column: 'content', embedding_model_endpoint_name: 'databricks-gte-large-en'}]`"
        - "Primary key set to `chunk_id`"
        - "Polls the index until its `index_status.detailed_state` indicates the initial sync is done (`READY` / `ONLINE_NO_PENDING_UPDATE`)"
        - "Queries via `index.similarity_search(query_text='...', columns=['doc_uri','title','content'], num_results=3)` — uses query_text, not query_vector, since embeddings are managed"
        - "Returns the 3 results, not just the call — verifies the query actually worked"
      databricks_outcomes:
        - kind: vector_search_endpoint_ready
          name: "rag-vs-endpoint"
        - kind: vector_search_index_exists
          name: "ai_dev_kit_test.rag.docs_chunks_vs_index"
        - kind: vector_search_index_synced
          name: "ai_dev_kit_test.rag.docs_chunks_vs_index"
        - kind: vector_search_query_returns_results
          name: "ai_dev_kit_test.rag.docs_chunks_vs_index"
          min_results: 3
    metadata:
      category: happy_path
      difficulty: medium
      tags: [endpoint, delta-sync, managed-embeddings, query, e2e]

  # ============================================================================
  # 2. Self-managed embeddings + filtered query
  # ============================================================================
  - id: vs_self_managed_filtered_002
    inputs:
      prompt: |
        I already have a Delta table `ai_dev_kit_test.rag.docs_with_embeddings`
        where I've precomputed embeddings in a column `embedding ARRAY<FLOAT>`
        (1024-dim, from `databricks-gte-large-en`).

        Build a Delta-sync vector search index on this table using
        self-managed embeddings (no managed embedding column), on endpoint
        `rag-vs-endpoint`. Index name: `ai_dev_kit_test.rag.docs_self_managed_idx`.

        Then run a query for "billing dispute resolution", but filter so it
        only returns chunks where `category` is one of {"billing", "support"}.
        Return top 5.
    outputs:
      execution_success: true
    expectations:
      expected_facts:
        - "Creates the index with `embedding_vector_column='embedding'` and `embedding_dimension=1024` (NOT embedding_source_columns — that's the managed path)"
        - "Source table still needs Change Data Feed enabled"
        - "Query supplies `query_vector` (or `query_text` if managed; here the user said precomputed, so embedding the query manually first OR using query_text via the model name is acceptable)"
        - "Filter passed as `filters={'category': ['billing', 'support']}` — JSON object, NOT a SQL WHERE string"
        - "Waits for the index to be ONLINE / READY before querying"
        - "Returns 5 results, all of which have category in {billing, support}"
      databricks_outcomes:
        - kind: vector_search_index_exists
          name: "ai_dev_kit_test.rag.docs_self_managed_idx"
        - kind: vector_search_index_uses_self_managed_embeddings
          name: "ai_dev_kit_test.rag.docs_self_managed_idx"
        - kind: vector_search_query_filter_holds
          name: "ai_dev_kit_test.rag.docs_self_managed_idx"
          filter_column: "category"
          allowed_values: ["billing", "support"]
    metadata:
      category: happy_path
      difficulty: medium
      tags: [self-managed-embeddings, filters, query, delta-sync]

  # ============================================================================
  # 3. Direct Access index — upsert + delete + query
  # ============================================================================
  - id: vs_direct_access_crud_003
    inputs:
      prompt: |
        I need a vector search index where I push documents directly via API
        (not synced from a Delta table). Create a Direct Access index named
        `ai_dev_kit_test.rag.support_kb_direct` on `rag-vs-endpoint`. Schema:
        `id STRING (pk), text STRING, embedding ARRAY<FLOAT>` (1024-dim).

        Then:
          1. Upsert 3 documents (make up realistic support-KB content +
             precomputed embeddings using `databricks-gte-large-en`).
          2. Query for the most similar document to "how do I reset my password".
          3. Delete one of the documents by id.
          4. Verify it's gone by re-querying.
    outputs:
      execution_success: true
    expectations:
      expected_facts:
        - "Creates the index with `index_type='DIRECT_ACCESS'` and an explicit `schema` definition (id pk, text, embedding ARRAY<FLOAT>)"
        - "Upserts via `index.upsert(rows)` where each row has `id`, `text`, and a real 1024-d embedding"
        - "Embeddings are real vectors from `databricks-gte-large-en` (the Foundation Model API embedding endpoint), NOT zeros or random"
        - "Queries with `index.similarity_search(query_vector=<embedded query>, ...)` — direct access requires query_vector, not query_text"
        - "Deletes via `index.delete(primary_keys=[<id>])`"
        - "Re-queries and confirms the deleted document is no longer returned"
      databricks_outcomes:
        - kind: vector_search_index_exists
          name: "ai_dev_kit_test.rag.support_kb_direct"
        - kind: vector_search_index_type
          name: "ai_dev_kit_test.rag.support_kb_direct"
          index_type: "DIRECT_ACCESS"
        - kind: vector_search_row_count
          name: "ai_dev_kit_test.rag.support_kb_direct"
          after_delete_count: 2
    metadata:
      category: happy_path
      difficulty: hard
      tags: [direct-access, upsert, delete, query, embeddings]
