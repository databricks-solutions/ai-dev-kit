metadata:
  skill_name: databricks-docs
  version: 1.0.0
  created_at: '2026-05-21T00:00:00.000000'
  description: |
    docs is a lookup/reference skill (WebFetch over `https://docs.databricks.com/llms.txt`),
    not an action skill. Tests verify the agent uses the llms.txt index correctly
    to find authoritative docs and apply them via the right action skill + CLI.

test_cases:
  # ============================================================================
  # 1. Look up an unfamiliar feature via the docs index
  # ============================================================================
  - id: docs_lookup_unfamiliar_feature_001
    inputs:
      prompt: |
        I'm reviewing a customer workspace and I keep seeing references to
        "Lakeflow Connect" but I don't know what it is. Find the authoritative
        Databricks documentation, summarize what it is in 2-3 sentences, and
        cite the doc URL you used.
    outputs:
      execution_success: true
    expectations:
      expected_facts:
        - "WebFetch on https://docs.databricks.com/llms.txt to consult the index"
        - "Follows a link from the index to a specific Lakeflow Connect doc page (does NOT hallucinate the feature)"
        - "Summarises the feature based on the fetched page and cites the URL"
      databricks_outcomes:
        - kind: response_cites_databricks_doc_url
        - kind: response_references_llms_txt
    metadata:
      category: happy_path
      difficulty: easy
      tags: [lookup, llms-txt, webfetch]

  # ============================================================================
  # 2. Complement another skill — find docs + apply via CLI
  # ============================================================================
  - id: docs_complement_action_skill_002
    inputs:
      prompt: |
        I need to enable predictive optimization on a Delta table but I can't
        remember the exact SQL syntax. Look up the current docs, then give me
        the working SQL statement and the `databricks` CLI command that would
        execute it against a SQL warehouse.
    outputs:
      execution_success: true
    expectations:
      expected_facts:
        - "WebFetch llms.txt index, then a specific predictive optimization doc page (no syntax guessing)"
        - "Returns the SQL `ALTER TABLE ... SET TBLPROPERTIES ('delta.predictiveOptimization' = 'enable')` or the equivalent ALTER current at the time"
        - "Provides a `databricks experimental aitools tools query --warehouse <WH> \"...\"` CLI invocation (or equivalent) to execute it"
        - "Cites the doc page URL it pulled the syntax from"
      databricks_outcomes:
        - kind: response_cites_databricks_doc_url
        - kind: response_includes_runnable_cli_command
    metadata:
      category: happy_path
      difficulty: medium
      tags: [lookup, complement, sql, predictive-optimization]
