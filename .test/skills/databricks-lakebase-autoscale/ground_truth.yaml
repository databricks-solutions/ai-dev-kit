- id: lakebase_auto_full_project_setup_007
  inputs:
    prompt: |
      Create a new Lakebase Autoscaling project for a retail customer support system.
      - Project name: `support-autoscale`
      - Display name: `Support Autoscale`
      - PG version 17
      - Set autoscaling compute: min 0 CU, max 2 CU with scale-to-zero enabled (5 minute suspend timeout)
      - Create a `production` branch (default, protected) with a read-write endpoint
      - Create a `dev` branch from production with a 7-day TTL expiration
      - Generate an OAuth credential and verify connectivity to the production endpoint by running `SELECT version()`
      - Create a database named `support_db`
  outputs:
    response: |
      Here's how to set up a complete Lakebase Autoscaling project for a retail customer support system:

      ```python
      from databricks.sdk import WorkspaceClient
      from databricks.sdk.service.postgres import (
          Project, ProjectSpec, Branch, BranchSpec,
          Endpoint, EndpointSpec, FieldMask, Duration
      )
      import psycopg

      w = WorkspaceClient()

      # Step 1: Create the project (production branch + default endpoint created automatically)
      project = w.postgres.create_project(
          project=Project(
              spec=ProjectSpec(
                  display_name="Support Autoscale",
                  pg_version="17"
              )
          ),
          project_id="support-autoscale"
      ).wait()
      print(f"Created project: {project.name}")

      # Step 2: Configure autoscaling on the production endpoint (0-2 CU, scale-to-zero 5 min)
      w.postgres.update_endpoint(
          name="projects/support-autoscale/branches/production/endpoints/ep-primary",
          endpoint=Endpoint(
              name="projects/support-autoscale/branches/production/endpoints/ep-primary",
              spec=EndpointSpec(
                  autoscaling_limit_min_cu=0,
                  autoscaling_limit_max_cu=2.0,
                  suspend_timeout_seconds=300
              )
          ),
          update_mask=FieldMask(field_mask=[
              "spec.autoscaling_limit_min_cu",
              "spec.autoscaling_limit_max_cu",
              "spec.suspend_timeout_seconds"
          ])
      ).wait()
      print("Configured autoscaling: 0-2 CU with 5-minute scale-to-zero")

      # Step 3: Protect the production branch
      w.postgres.update_branch(
          name="projects/support-autoscale/branches/production",
          branch=Branch(
              name="projects/support-autoscale/branches/production",
              spec=BranchSpec(is_protected=True)
          ),
          update_mask=FieldMask(field_mask=["spec.is_protected"])
      ).wait()
      print("Production branch is now protected")

      # Step 4: Create dev branch from production with 7-day TTL
      dev_branch = w.postgres.create_branch(
          parent="projects/support-autoscale",
          branch=Branch(
              spec=BranchSpec(
                  source_branch="projects/support-autoscale/branches/production",
                  ttl=Duration(seconds=604800)  # 7 days
              )
          ),
          branch_id="dev"
      ).wait()
      print(f"Created dev branch: {dev_branch.name} (expires in 7 days)")

      # Step 5: Generate OAuth credential and verify connectivity
      endpoint = w.postgres.get_endpoint(
          name="projects/support-autoscale/branches/production/endpoints/ep-primary"
      )
      host = endpoint.status.hosts.host

      cred = w.postgres.generate_database_credential(
          endpoint="projects/support-autoscale/branches/production/endpoints/ep-primary"
      )

      conn_string = (
          f"host={host} "
          f"dbname=databricks_postgres "
          f"user={w.current_user.me().user_name} "
          f"password={cred.token} "
          f"sslmode=require"
      )
      with psycopg.connect(conn_string) as conn:
          with conn.cursor() as cur:
              cur.execute("SELECT version()")
              print(f"Connected! PostgreSQL version: {cur.fetchone()[0]}")

      # Step 6: Create the support_db database
      with psycopg.connect(conn_string) as conn:
          conn.autocommit = True
          with conn.cursor() as cur:
              cur.execute("CREATE DATABASE support_db")
      print("Created database: support_db")
      ```

      **Key points:**

      - The `production` branch and a primary read-write endpoint (`ep-primary`) are created automatically when you create a project.
      - `update_endpoint` with `FieldMask` configures autoscaling limits (0-2 CU) and the scale-to-zero suspend timeout (300 seconds = 5 minutes).
      - `update_branch` with `is_protected=True` prevents accidental deletion or reset of the production branch.
      - The `dev` branch uses copy-on-write from production, so it's storage-efficient. The 7-day TTL (`Duration(seconds=604800)`) auto-deletes it after expiration.
      - OAuth tokens expire after 1 hour; for production apps, implement token refresh at ~45 minutes.
      - `CREATE DATABASE` is standard PostgreSQL DDL executed over the psycopg connection. The connection must have `autocommit = True` since `CREATE DATABASE` cannot run inside a transaction.
      - All SDK create/update/delete operations are long-running and require `.wait()` to block until completion.
      - Always use `sslmode=require` in connection strings.
    execution_success: true
  expectations:
    expected_facts:
    - "Project is created with w.postgres.create_project() using ProjectSpec"
    - "create_project returns a long-running operation that requires .wait()"
    - "Production branch and primary endpoint (ep-primary) are created automatically with the project"
    - "Autoscaling is configured via update_endpoint with FieldMask"
    - "Scale-to-zero is set via suspend_timeout_seconds (300 = 5 minutes)"
    - "Production branch is protected using update_branch with is_protected=True"
    - "Dev branch is created with create_branch using a TTL Duration for 7-day expiration"
    - "OAuth tokens are generated via generate_database_credential()"
    - "Connectivity is verified by running SELECT version() over psycopg"
    - "CREATE DATABASE requires autocommit=True on the psycopg connection"
    - "All connection strings must include sslmode=require"
    expected_patterns:
    - pattern: "create_project"
      min_count: 1
      description: "Uses create_project() to create the Lakebase project"
    - pattern: "update_endpoint"
      min_count: 1
      description: "Uses update_endpoint() to configure autoscaling"
    - pattern: "autoscaling_limit_min_cu"
      min_count: 1
      description: "Sets minimum autoscaling CU"
    - pattern: "autoscaling_limit_max_cu"
      min_count: 1
      description: "Sets maximum autoscaling CU"
    - pattern: "is_protected"
      min_count: 1
      description: "Protects the production branch"
    - pattern: "create_branch"
      min_count: 1
      description: "Creates the dev branch"
    - pattern: "Duration\\(seconds=604800\\)"
      min_count: 1
      description: "Sets 7-day TTL on dev branch"
    - pattern: "CREATE DATABASE support_db"
      min_count: 1
      description: "Creates the support_db database"
    guidelines:
    - "Must create the project with display_name='Support Autoscale' and pg_version='17'"
    - "Must configure autoscaling with min 0 CU and max 2.0 CU"
    - "Must enable scale-to-zero with a 5-minute (300 second) timeout"
    - "Must protect the production branch using update_branch"
    - "Must create a dev branch from production with 7-day TTL expiration"
    - "Must create a database named support_db using standard Postgres DDL"
    - "Must include sslmode=require in connection strings"
    - "Must use FieldMask for all update operations"
  metadata:
    category: happy_path
    difficulty: hard
    source: interactive_add

- id: lakebase_auto_schema_ddl_008
  inputs:
    prompt: |
      Connect to the `support_db` database on the `production` branch of the `support-autoscale` Lakebase project.
      Create a `support` schema and build the following tables with appropriate constraints, indexes, and foreign keys:

      **products** - Product catalog for referencing in support cases
      - product_id (PK, serial), sku (unique, varchar 50), name (varchar 200), category (varchar 100), price (numeric 10,2), is_active (boolean default true), created_at (timestamptz default now)

      **customers** - Customer records
      - customer_id (PK, serial), email (unique, varchar 255), first_name (varchar 100), last_name (varchar 100), membership_tier (varchar 20, check in 'Free','Pro','Enterprise'), region (varchar 50), created_at (timestamptz default now)

      **orders** - Order history tied to customers
      - order_id (PK, serial), customer_id (FK to customers), order_date (timestamptz default now), total_amount (numeric 12,2), status (varchar 20, check in 'pending','processing','shipped','delivered','cancelled','returned'), shipping_address (text), created_at (timestamptz default now)

      **order_items** - Line items tying orders to products
      - order_item_id (PK, serial), order_id (FK to orders ON DELETE CASCADE), product_id (FK to products), quantity (integer, check > 0), unit_price (numeric 10,2), created_at (timestamptz default now)

      Add indexes on: customers(email), orders(customer_id, order_date), order_items(order_id), order_items(product_id), orders(status).

      Verify the schema was created correctly by querying information_schema.
  outputs:
    response: |
      Here's how to connect to the Lakebase Autoscale project and build the support schema:

      ```python
      import psycopg
      from databricks.sdk import WorkspaceClient

      w = WorkspaceClient()

      # Get production endpoint for the support-autoscale project
      endpoint = w.postgres.get_endpoint(
          name="projects/support-autoscale/branches/production/endpoints/ep-primary"
      )
      host = endpoint.status.hosts.host

      # Generate OAuth credential scoped to this endpoint
      cred = w.postgres.generate_database_credential(
          endpoint="projects/support-autoscale/branches/production/endpoints/ep-primary"
      )

      # Connect to support_db on the production branch
      conn_string = (
          f"host={host} "
          f"dbname=support_db "
          f"user={w.current_user.me().user_name} "
          f"password={cred.token} "
          f"sslmode=require"
      )

      with psycopg.connect(conn_string) as conn:
          conn.autocommit = True
          with conn.cursor() as cur:
              cur.execute("CREATE SCHEMA IF NOT EXISTS support")

              cur.execute("""
                  CREATE TABLE support.products (
                      product_id SERIAL PRIMARY KEY,
                      sku VARCHAR(50) UNIQUE NOT NULL,
                      name VARCHAR(200) NOT NULL,
                      category VARCHAR(100),
                      price NUMERIC(10, 2),
                      is_active BOOLEAN DEFAULT TRUE,
                      created_at TIMESTAMPTZ DEFAULT NOW()
                  )
              """)

              cur.execute("""
                  CREATE TABLE support.customers (
                      customer_id SERIAL PRIMARY KEY,
                      email VARCHAR(255) UNIQUE NOT NULL,
                      first_name VARCHAR(100) NOT NULL,
                      last_name VARCHAR(100) NOT NULL,
                      membership_tier VARCHAR(20) CHECK (
                          membership_tier IN ('Free', 'Pro', 'Enterprise')
                      ),
                      region VARCHAR(50),
                      created_at TIMESTAMPTZ DEFAULT NOW()
                  )
              """)

              cur.execute("""
                  CREATE TABLE support.orders (
                      order_id SERIAL PRIMARY KEY,
                      customer_id INTEGER NOT NULL
                          REFERENCES support.customers(customer_id),
                      order_date TIMESTAMPTZ DEFAULT NOW(),
                      total_amount NUMERIC(12, 2),
                      status VARCHAR(20) CHECK (
                          status IN ('pending', 'processing', 'shipped',
                                     'delivered', 'cancelled', 'returned')
                      ),
                      shipping_address TEXT,
                      created_at TIMESTAMPTZ DEFAULT NOW()
                  )
              """)

              cur.execute("""
                  CREATE TABLE support.order_items (
                      order_item_id SERIAL PRIMARY KEY,
                      order_id INTEGER NOT NULL
                          REFERENCES support.orders(order_id) ON DELETE CASCADE,
                      product_id INTEGER NOT NULL
                          REFERENCES support.products(product_id),
                      quantity INTEGER CHECK (quantity > 0),
                      unit_price NUMERIC(10, 2),
                      created_at TIMESTAMPTZ DEFAULT NOW()
                  )
              """)

              cur.execute("CREATE INDEX idx_customers_email ON support.customers(email)")
              cur.execute("CREATE INDEX idx_orders_customer_date ON support.orders(customer_id, order_date)")
              cur.execute("CREATE INDEX idx_order_items_order ON support.order_items(order_id)")
              cur.execute("CREATE INDEX idx_order_items_product ON support.order_items(product_id)")
              cur.execute("CREATE INDEX idx_orders_status ON support.orders(status)")

              cur.execute("""
                  SELECT table_name, column_name, data_type, is_nullable
                  FROM information_schema.columns
                  WHERE table_schema = 'support'
                  ORDER BY table_name, ordinal_position
              """)
              print("Schema columns:")
              for row in cur.fetchall():
                  print(f"  {row[0]}.{row[1]}: {row[2]} (nullable: {row[3]})")

              cur.execute("""
                  SELECT indexname, tablename
                  FROM pg_indexes
                  WHERE schemaname = 'support'
                  ORDER BY tablename, indexname
              """)
              print("\nIndexes:")
              for row in cur.fetchall():
                  print(f"  {row[0]} on {row[1]}")
      ```

      **Key points:**

      - Connect to `support_db` (not the default `databricks_postgres`) by specifying `dbname=support_db`.
      - `autocommit = True` is required for DDL statements.
      - Foreign keys: `orders.customer_id` references `customers`; `order_items` references `orders` (ON DELETE CASCADE) and `products`.
      - CHECK constraints enforce valid values for `membership_tier`, `status`, and `quantity > 0`.
      - The composite index on `orders(customer_id, order_date)` optimizes queries that filter by customer and sort by date.
      - Verification uses `information_schema.columns` and `pg_indexes`.
      - Always use `sslmode=require` in connection strings.
    execution_success: true
  expectations:
    expected_facts:
    - "Connection uses w.postgres.get_endpoint() and generate_database_credential() for Autoscale"
    - "Connects to support_db via dbname=support_db in the connection string"
    - "autocommit must be True for DDL statements"
    - "Creates a support schema with CREATE SCHEMA IF NOT EXISTS"
    - "products table has SERIAL PK, UNIQUE sku, and BOOLEAN default"
    - "customers table has CHECK constraint on membership_tier"
    - "orders table has FK to customers(customer_id)"
    - "order_items table has FK to orders with ON DELETE CASCADE"
    - "order_items table has FK to products(product_id)"
    - "CHECK constraint on quantity > 0"
    - "Composite index on orders(customer_id, order_date) for query optimization"
    - "Verification queries information_schema.columns and pg_indexes"
    - "sslmode=require is used in the connection string"
    expected_patterns:
    - pattern: "get_endpoint"
      min_count: 1
      description: "Gets endpoint details for connection host"
    - pattern: "generate_database_credential"
      min_count: 1
      description: "Generates OAuth token for authentication"
    - pattern: "support_db"
      min_count: 1
      description: "Connects to the support_db database"
    - pattern: "sslmode=require"
      min_count: 1
      description: "Requires SSL for the connection"
    - pattern: "CREATE SCHEMA"
      min_count: 1
      description: "Creates the support schema"
    - pattern: "CREATE TABLE support\\.products"
      min_count: 1
      description: "Creates the products table in support schema"
    - pattern: "CREATE TABLE support\\.customers"
      min_count: 1
      description: "Creates the customers table in support schema"
    - pattern: "CREATE TABLE support\\.orders"
      min_count: 1
      description: "Creates the orders table in support schema"
    - pattern: "CREATE TABLE support\\.order_items"
      min_count: 1
      description: "Creates the order_items table in support schema"
    - pattern: "ON DELETE CASCADE"
      min_count: 1
      description: "Cascade delete on order_items when order is deleted"
