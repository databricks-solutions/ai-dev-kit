- id: lakebase_auto_support_cases_ddl_009
  inputs:
    prompt: |
      Use uv to install psycopg if not installed (use pip as a fallback).
      Connect to `support_db` on `production` of `support-autoscale` and add support case tables to the `support` schema:

      **support_cases** - Customer support tickets tied to orders
      - case_id (PK, serial), customer_id (FK to customers NOT NULL), order_id (FK to orders, nullable - not all cases relate to an order), subject (varchar 300 NOT NULL), description (text), category (varchar 50, check in 'order_issue','product_defect','shipping','billing','returns','general'), priority (varchar 20, check in 'low','medium','high','critical'), status (varchar 20 default 'open', check in 'open','in_progress','waiting_customer','resolved','closed'), assigned_agent (varchar 100), created_at (timestamptz default now), updated_at (timestamptz default now), resolved_at (timestamptz nullable)

      **case_products** - Junction table linking cases to one or more products involved
      - case_product_id (PK, serial), case_id (FK to support_cases ON DELETE CASCADE), product_id (FK to products), is_primary (boolean default false), created_at (timestamptz default now)
      - Add unique constraint on (case_id, product_id)

      **case_notes** - Activity log / notes on each support case
      - note_id (PK, serial), case_id (FK to support_cases ON DELETE CASCADE), author (varchar 100 NOT NULL), note_type (varchar 20, check in 'internal','customer_reply','agent_reply','system'), content (text NOT NULL), created_at (timestamptz default now)

      Add indexes on: support_cases(customer_id), support_cases(order_id), support_cases(status, priority), support_cases(created_at), case_products(case_id), case_products(product_id), case_notes(case_id, created_at).
  outputs:
    response: |
      Here's how to install psycopg, connect to the Lakebase Autoscale project, and create the support case tables:

      ```python
      import subprocess
      import sys

      try:
          import psycopg
      except ImportError:
          try:
              subprocess.check_call(["uv", "pip", "install", "psycopg[binary]>=3.0"])
          except (subprocess.CalledProcessError, FileNotFoundError):
              subprocess.check_call(
                  [sys.executable, "-m", "pip", "install", "psycopg[binary]>=3.0"]
              )
          import psycopg

      from databricks.sdk import WorkspaceClient

      w = WorkspaceClient()

      endpoint = w.postgres.get_endpoint(
          name="projects/support-autoscale/branches/production/endpoints/ep-primary"
      )
      host = endpoint.status.hosts.host

      cred = w.postgres.generate_database_credential(
          endpoint="projects/support-autoscale/branches/production/endpoints/ep-primary"
      )

      conn_string = (
          f"host={host} "
          f"dbname=support_db "
          f"user={w.current_user.me().user_name} "
          f"password={cred.token} "
          f"sslmode=require"
      )

      with psycopg.connect(conn_string) as conn:
          conn.autocommit = True
          with conn.cursor() as cur:
              cur.execute("""
                  CREATE TABLE support.support_cases (
                      case_id SERIAL PRIMARY KEY,
                      customer_id INTEGER NOT NULL
                          REFERENCES support.customers(customer_id),
                      order_id INTEGER
                          REFERENCES support.orders(order_id),
                      subject VARCHAR(300) NOT NULL,
                      description TEXT,
                      category VARCHAR(50) CHECK (
                          category IN ('order_issue', 'product_defect', 'shipping',
                                       'billing', 'returns', 'general')
                      ),
                      priority VARCHAR(20) CHECK (
                          priority IN ('low', 'medium', 'high', 'critical')
                      ),
                      status VARCHAR(20) DEFAULT 'open' CHECK (
                          status IN ('open', 'in_progress', 'waiting_customer',
                                     'resolved', 'closed')
                      ),
                      assigned_agent VARCHAR(100),
                      created_at TIMESTAMPTZ DEFAULT NOW(),
                      updated_at TIMESTAMPTZ DEFAULT NOW(),
                      resolved_at TIMESTAMPTZ
                  )
              """)

              cur.execute("""
                  CREATE TABLE support.case_products (
                      case_product_id SERIAL PRIMARY KEY,
                      case_id INTEGER NOT NULL
                          REFERENCES support.support_cases(case_id) ON DELETE CASCADE,
                      product_id INTEGER NOT NULL
                          REFERENCES support.products(product_id),
                      is_primary BOOLEAN DEFAULT FALSE,
                      created_at TIMESTAMPTZ DEFAULT NOW(),
                      UNIQUE (case_id, product_id)
                  )
              """)

              cur.execute("""
                  CREATE TABLE support.case_notes (
                      note_id SERIAL PRIMARY KEY,
                      case_id INTEGER NOT NULL
                          REFERENCES support.support_cases(case_id) ON DELETE CASCADE,
                      author VARCHAR(100) NOT NULL,
                      note_type VARCHAR(20) CHECK (
                          note_type IN ('internal', 'customer_reply',
                                        'agent_reply', 'system')
                      ),
                      content TEXT NOT NULL,
                      created_at TIMESTAMPTZ DEFAULT NOW()
                  )
              """)

              cur.execute("CREATE INDEX idx_cases_customer ON support.support_cases(customer_id)")
              cur.execute("CREATE INDEX idx_cases_order ON support.support_cases(order_id)")
              cur.execute("CREATE INDEX idx_cases_status_priority ON support.support_cases(status, priority)")
              cur.execute("CREATE INDEX idx_cases_created ON support.support_cases(created_at)")
              cur.execute("CREATE INDEX idx_case_products_case ON support.case_products(case_id)")
              cur.execute("CREATE INDEX idx_case_products_product ON support.case_products(product_id)")
              cur.execute("CREATE INDEX idx_case_notes_case_created ON support.case_notes(case_id, created_at)")

              cur.execute("""
                  SELECT table_name, column_name, data_type, column_default, is_nullable
                  FROM information_schema.columns
                  WHERE table_schema = 'support'
                    AND table_name IN ('support_cases', 'case_products', 'case_notes')
                  ORDER BY table_name, ordinal_position
              """)
              print("New table columns:")
              for row in cur.fetchall():
                  print(f"  {row[0]}.{row[1]}: {row[2]} (default: {row[3]}, nullable: {row[4]})")

              cur.execute("""
                  SELECT indexname, tablename
                  FROM pg_indexes
                  WHERE schemaname = 'support'
                    AND tablename IN ('support_cases', 'case_products', 'case_notes')
                  ORDER BY tablename, indexname
              """)
              print("\nIndexes:")
              for row in cur.fetchall():
                  print(f"  {row[0]} on {row[1]}")

              cur.execute("""
                  SELECT constraint_name, constraint_type
                  FROM information_schema.table_constraints
                  WHERE table_schema = 'support'
                    AND table_name = 'case_products'
                    AND constraint_type = 'UNIQUE'
              """)
              for row in cur.fetchall():
                  print(f"\nUnique constraint: {row[0]} ({row[1]})")
      ```

      **Key points:**

      - **psycopg install**: Tries `uv pip install` first for speed, falls back to `pip` if uv is unavailable.
      - **Nullable FK**: `order_id` on `support_cases` is nullable because not all cases relate to an order.
      - **Default status**: `status DEFAULT 'open'` with CHECK means new cases start open and can only transition to valid states.
      - **Junction table**: `case_products` uses `UNIQUE (case_id, product_id)` to prevent duplicate product associations.
      - **ON DELETE CASCADE**: Deleting a support case automatically removes its `case_products` and `case_notes`.
      - **Composite indexes**: `idx_cases_status_priority` optimizes dashboard queries; `idx_case_notes_case_created` optimizes chronological note retrieval.
      - OAuth tokens expire after 1 hour. Always use `sslmode=require`.
    execution_success: true
