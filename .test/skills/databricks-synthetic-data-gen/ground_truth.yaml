metadata:
  skill_name: databricks-synthetic-data-gen
  version: 1.0.0
  created_at: '2026-05-21T00:00:00.000000'
  description: |
    Outcome-oriented tests for synthetic data generation. Each prompt asks the
    agent to generate realistic, story-driven data (skewed distributions, valid
    FKs, business signal) and persist to Unity Catalog. Tests verify the
    resulting tables exist, have the expected schema and row counts, and that
    the data isn't uniform/garbage (FKs match, distributions are skewed).

test_cases:
  # ============================================================================
  # 1. Local-then-upload — small dataset, parquet → UC Volume
  # ============================================================================
  - id: synth_local_parquet_001
    inputs:
      prompt: |
        Generate a small synthetic e-commerce dataset locally (this is a tiny
        dev sample), then upload it to Unity Catalog.

        Two related tables with proper referential integrity:
          • customers (5,000 rows): customer_id, name, email, tier
            (Free/Pro/Enterprise weighted 60/30/10), region, created_at.
          • orders (15,000 rows): order_id, customer_id (FK → customers.customer_id),
            amount (log-normal), order_date, status.

        Skewed signal: Enterprise tier customers must generate more orders on
        average than Free tier. Amount must be log-normal (not uniform).

        Save as Parquet then upload to a UC volume at
        `/Volumes/ai_dev_kit_test/synth/devkit_gen1_test_small_parquet/`.
    outputs:
      execution_success: true
    expectations:
      expected_facts:
        - "Uses Polars + Mimesis (or pandas + Faker) locally since the dataset is <30K rows"
        - "Writes as Parquet — `.to_parquet()` or `.write_parquet()`"
        - "Asks the user for catalog/schema or confirms them; never silently defaults"
        - "Tier distribution is weighted (60/30/10), NOT uniform"
        - "Amount uses log-normal (`np.random.lognormal` / `random.lognormvariate`), NOT uniform"
        - "orders.customer_id is drawn from customers.customer_id with higher weight for Enterprise — referential integrity holds for all 15,000 rows"
        - "Uploads with `databricks fs cp -r --overwrite ./out dbfs:/Volumes/ai_dev_kit_test/synth/devkit_gen1_test_small_parquet/` (dbfs: prefix required)"
        - "Verifies with `databricks fs ls dbfs:/Volumes/...`"
      databricks_outcomes:
        - kind: uc_volume_contains_files
          path: "/Volumes/ai_dev_kit_test/synth/devkit_gen1_test_small_parquet/"
          extension: ".parquet"
          min_count: 2
        - kind: synth_referential_integrity_holds
          parent_table_path: "customers.parquet"
          child_table_path: "orders.parquet"
          fk_column: "customer_id"
        - kind: synth_distribution_skewed
          parquet: "orders.parquet"
          column: "amount"
          not_uniform: true
    metadata:
      category: happy_path
      difficulty: easy
      tags: [local, polars, parquet, volume, small-data]

  # ============================================================================
  # 2. Serverless → Delta — medium dataset, story-driven
  # ============================================================================
  - id: synth_serverless_delta_002
    inputs:
      prompt: |
        Generate a synthetic SaaS subscription dataset on Databricks serverless
        (use Spark + Faker + Pandas UDFs). Write the result to Delta tables in
        UC under schema `ai_dev_kit_test.synth_saas`.

        Three related tables:
          • accounts (50,000 rows): account_id, company_name, industry (weighted),
            seat_count (log-normal), signup_date, plan_tier (weighted Starter/
            Growth/Enterprise).
          • subscriptions (~50,000 rows, one per account): subscription_id,
            account_id (FK), mrr_dollars (depends on plan_tier + seat_count),
            status (Active/Cancelled, with a churn signal — Starter churns 5x
            more than Enterprise).
          • events (200,000 rows): event_id, account_id (FK), event_type
            (weighted login/feature_use/api_call/...), event_ts.

        The story: a noticeable spike in Starter-tier churn in the last 30
        days. Make the data show it.
    outputs:
      execution_success: true
    expectations:
      expected_facts:
        - "Runs on serverless compute (Databricks Connect serverless, NOT execute_code or local Python — required for this row count)"
        - "Spark + Faker via Pandas UDFs for parallel generation; NO Python loops, NO .collect(), NO .cache()/.persist() (not supported on serverless)"
        - "Creates the schema first if it doesn't exist: `CREATE SCHEMA IF NOT EXISTS ai_dev_kit_test.synth_saas`"
        - "Writes parent tables (accounts) first, then children with valid FKs derived from the parent table"
        - "All three tables saved as Delta via `.saveAsTable(\"ai_dev_kit_test.synth_saas.<table>\")` (or write.mode().format('delta'))"
        - "Churn signal is in the data: `WHERE plan_tier = 'Starter' AND status = 'Cancelled' AND cancelled_at >= current_date() - 30` returns visibly more rows than the same query for Enterprise"
        - "Distributions are weighted/skewed — verifies after write by sampling and showing the weight distribution per column"
      databricks_outcomes:
        - kind: uc_table_exists
          name: "ai_dev_kit_test.synth_saas.accounts"
        - kind: uc_table_exists
          name: "ai_dev_kit_test.synth_saas.subscriptions"
        - kind: uc_table_exists
          name: "ai_dev_kit_test.synth_saas.events"
        - kind: uc_table_row_count_at_least
          name: "ai_dev_kit_test.synth_saas.accounts"
          min: 45000
        - kind: synth_referential_integrity_holds
          parent_table: "ai_dev_kit_test.synth_saas.accounts"
          child_table: "ai_dev_kit_test.synth_saas.subscriptions"
          fk_column: "account_id"
        - kind: synth_story_signal_present
          query: |
            SELECT plan_tier, COUNT(*) FROM ai_dev_kit_test.synth_saas.subscriptions
            WHERE status='Cancelled' GROUP BY plan_tier
          assertion: "Starter count > Enterprise count by at least 3x"
    metadata:
      category: happy_path
      difficulty: hard
      tags: [serverless, spark, faker, delta, multi-table, story-driven]

  # ============================================================================
  # 3. Time-pattern data — sensor IoT with realistic temporal signal
  # ============================================================================
  - id: synth_iot_time_patterns_003
    inputs:
      prompt: |
        Generate synthetic IoT sensor readings on Databricks serverless. Save
        to `ai_dev_kit_test.synth_iot.sensor_readings` (Delta).

        Schema: sensor_id, plant_id, reading_ts TIMESTAMP, temperature_c
        DOUBLE, vibration_g DOUBLE, status STRING (NORMAL/WARNING/CRITICAL).

        Requirements:
          • 100 sensors across 5 plants, 30 days of data, one reading per
            minute (so ~4.3M rows total).
          • Realistic time patterns: weekday/weekend cycles (production
            slows on weekends → lower vibration), daily diurnal temperature
            swings, and 2-3 unusual events where one sensor drifts toward
            CRITICAL over ~2 hours.
          • status correlates with the underlying numeric values — when
            vibration > some threshold, status flips to WARNING/CRITICAL.
    outputs:
      execution_success: true
    expectations:
      expected_facts:
        - "Generation runs on Databricks serverless (not local Python — 4M+ rows requires Spark)"
        - "Time series generated with realistic cycles: weekday/weekend multiplier, diurnal sine wave, baseline + noise"
        - "Anomaly events: 2-3 sensors have a temporary drift in vibration that resolves; NOT injected as a uniform random spike"
        - "status is derived from numeric values (correlated), NOT generated independently"
        - "Saved as a single Delta table with CLUSTER BY (reading_ts, sensor_id) or similar — agent picks reasonable layout for IoT time-series"
        - "Verifies story signal: a SELECT showing weekend vibration < weekday vibration; a SELECT showing the CRITICAL events are clustered in time around the injected anomalies"
      databricks_outcomes:
        - kind: uc_table_exists
          name: "ai_dev_kit_test.synth_iot.sensor_readings"
        - kind: uc_table_row_count_at_least
          name: "ai_dev_kit_test.synth_iot.sensor_readings"
          min: 4000000
        - kind: synth_time_pattern_present
          query: |
            SELECT dayofweek(reading_ts) AS dow, avg(vibration_g)
            FROM ai_dev_kit_test.synth_iot.sensor_readings GROUP BY dow
          assertion: "weekend (1,7) avg vibration_g visibly lower than weekday (2-6) avg"
        - kind: synth_anomaly_clusters_in_time
          name: "ai_dev_kit_test.synth_iot.sensor_readings"
          status_column: "status"
          ts_column: "reading_ts"
    metadata:
      category: happy_path
      difficulty: hard
      tags: [serverless, iot, time-series, anomaly, large-scale, delta]
